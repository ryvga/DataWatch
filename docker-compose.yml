services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datawatch
      POSTGRES_USER: datawatch
      POSTGRES_PASSWORD: datawatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datawatch -d datawatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Test/demo database — monitored by DataWatch ───────────────────────────
  demo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopDemo
      POSTGRES_USER: readonly_user
      POSTGRES_PASSWORD: readonly_pass
    volumes:
      - demo_db_data:/var/lib/postgresql/data
      - ./scripts/demo_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readonly_user -d shopDemo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MailHog — dev SMTP + web UI ───────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    environment:
      MH_STORAGE: memory

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --pool=threads --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  demo_db_data:
