# ──────────────────────────────────────────────────────────────────────────────
# DataWatch / Panopta — Development Docker Compose
#
# Sections:
#   Infrastructure   postgres · redis · mailhog
#   Demo databases   demo-db · analytics-db
#   Application      migrate · api · worker
#   Frontend         frontend
#   Optional         seed  (docker compose --profile seed up seed)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datawatch
      POSTGRES_USER: datawatch
      POSTGRES_PASSWORD: datawatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datawatch -d datawatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MailHog — dev SMTP server + web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MH_STORAGE: memory

  # ── Demo databases ───────────────────────────────────────────────────────────

  # acme-corp e-commerce
  acme-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acmedb
      POSTGRES_USER: readonly_user
      POSTGRES_PASSWORD: readonly_pass
    volumes:
      - acme_db_data:/var/lib/postgresql/data
      - ./scripts/acme_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readonly_user -d acmedb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # startup-io SaaS analytics
  analytics-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: analytics_ro
      POSTGRES_PASSWORD: readonly_pass
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
      - ./scripts/startup_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_ro -d analyticsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application ──────────────────────────────────────────────────────────────

  # One-shot: runs Alembic migrations then exits.
  # api and worker wait for this to complete successfully before starting.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USE_TLS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
      migrate:
        condition: service_completed_successfully
      acme-db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USE_TLS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Frontend ─────────────────────────────────────────────────────────────────
  #
  # Uses Vite dev server with volume mount so code changes are reflected
  # immediately without rebuilding. node_modules live in a named volume so
  # npm ci only runs on first start or when package.json changes.
  #
  # Access: http://localhost:5173 · http://acme-corp.localhost:5173 · http://admin.localhost:5173

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci --prefer-offline 2>/dev/null || npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      API_TARGET: http://api:8000
      VITE_ADMIN_SUBDOMAIN: ${VITE_ADMIN_SUBDOMAIN:-admin}
      VITE_BASE_DOMAIN: ${VITE_BASE_DOMAIN:-datawatch.io}
    depends_on:
      - api

  # ── Optional: seed (docker compose --profile seed up seed) ───────────────────
  #
  # Populates the database with demo orgs, users, data sources, and injected
  # anomalies. Only runs when explicitly requested — not part of `docker compose
  # up -d`. Requires api to be up so the seed script can hit the REST API.
  #
  # Usage: docker compose --profile seed up seed
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python /scripts/quickstart.py
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    working_dir: /scripts
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
      - ACME_DB_URL=postgresql://write_user:write_pass@acme-db:5432/acmedb
      - ANALYTICS_DB_URL=postgresql://write_user:write_pass@analytics-db:5432/analyticsdb
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
      acme-db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
    restart: "no"
    profiles:
      - seed

  # ── Optional: simulator (docker compose --profile simulator up simulator) ────
  #
  # Continuously mutates the live databases to generate realistic data quality
  # incidents. Runs a random anomaly scenario every ~90s and auto-triggers
  # DataWatch profile runs so incidents appear immediately.
  #
  # Usage:
  #   docker compose --profile simulator up simulator
  #   docker compose --profile simulator up -d simulator   # background
  #
  # Run a specific scenario once:
  #   docker compose --profile simulator run --rm simulator \
  #     python /scripts/simulator.py --scenario null_spike
  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python /scripts/simulator.py --interval 90 --api-url http://api:8000
    volumes:
      - ./scripts:/scripts
    environment:
      ACME_DB_URL: postgresql://write_user:write_pass@acme-db:5432/acmedb
      ANALYTICS_DB_URL: postgresql://write_user:write_pass@analytics-db:5432/analyticsdb
      DATAWATCH_API_URL: http://api:8000
    depends_on:
      acme-db:
        condition: service_healthy
      analytics-db:
        condition: service_healthy
    profiles:
      - simulator
    restart: unless-stopped

volumes:
  postgres_data:
  acme_db_data:
  analytics_db_data:
  frontend_node_modules:
