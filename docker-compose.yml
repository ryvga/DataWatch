# ──────────────────────────────────────────────────────────────────────────────
# DataWatch / Panopta — Development Docker Compose
#
# Sections:
#   Infrastructure   postgres · redis · mailhog
#   Demo databases   demo-db · analytics-db
#   Application      migrate · api · worker
#   Frontend         frontend
#   Optional         seed  (docker compose --profile seed up seed)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datawatch
      POSTGRES_USER: datawatch
      POSTGRES_PASSWORD: datawatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datawatch -d datawatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MailHog — dev SMTP server + web UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MH_STORAGE: memory

  # ── Demo databases ───────────────────────────────────────────────────────────

  # acme-corp e-commerce (shopDemo)
  demo-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shopDemo
      POSTGRES_USER: readonly_user
      POSTGRES_PASSWORD: readonly_pass
    volumes:
      - demo_db_data:/var/lib/postgresql/data
      - ./scripts/demo_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readonly_user -d shopDemo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # startup-io SaaS analytics
  analytics-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analyticsdb
      POSTGRES_USER: analytics_ro
      POSTGRES_PASSWORD: readonly_pass
    volumes:
      - analytics_db_data:/var/lib/postgresql/data
      - ./scripts/analytics_db_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics_ro -d analyticsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application ──────────────────────────────────────────────────────────────

  # One-shot: runs Alembic migrations then exits.
  # api and worker wait for this to complete successfully before starting.
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USE_TLS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info --pool=threads --concurrency=4
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USE_TLS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  # ── Optional: seed (docker compose --profile seed up seed) ───────────────────
  #
  # Populates the database with demo orgs, users, data sources, and injected
  # anomalies. Only runs when explicitly requested — not part of `docker compose
  # up -d`. Requires api to be up so the seed script can hit the REST API.
  #
  # Usage: docker compose --profile seed up seed
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python /scripts/seed_demo.py --full
    volumes:
      - ./backend:/app
      - ./scripts:/scripts
    working_dir: /scripts
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    restart: "no"
    profiles:
      - seed

volumes:
  postgres_data:
  demo_db_data:
  analytics_db_data:
